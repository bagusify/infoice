<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">

<body>

    <div class="receipt-wrapper">
        <div class="receipt">
            
            <div class="text-center mb-4">
                <h1 class="brand-name">bagusify</h1>
                <div class="receipt-title">Payment Simulator</div>
            </div>

            <div class="meta-data">
                <div class="d-flex justify-content-between mb-1">
                    <span>Date Issued:</span>
                    <span id="ui-date" class="mono-num text-dark"></span>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span>Billed To:</span>
                    <span id="ui-client" class="client-badge"></span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Project Ref:</span>
                    <span id="ui-project" class="fw-medium text-dark"></span>
                </div>
            </div>

            <div class="divider"></div>

            <div id="ui-items"></div>

            <div class="simulator-panel">
                <div class="sim-title"><i class="bi bi-grid-1x2-fill me-2"></i>Configuration</div>
                
                <div class="form-check form-switch mb-4 pb-3 border-bottom">
                    <input class="form-check-input" type="checkbox" id="ctrl-domain">
                    <label class="form-check-label" for="ctrl-domain">Include Domain (.com) Promo</label>
                </div>

                <div class="sim-title"><i class="bi bi-wallet-fill me-2"></i>Terms</div>
                <div class="payment-options">
                    <label class="pay-opt-card active" id="card-full">
                        <input type="radio" name="pay_mode" value=" :root {
            /* bagusify Brand Palette */
            --bg-color: #0f172a; /* Deep tech slate */
            --receipt-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-cobalt: #2563eb; /* Electric Cobalt */
            --accent-teal: #0d9488;   /* Deep Teal */
            --dash-color: #cbd5e1;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif; /* Clean, modern sans-serif */
            color: var(--text-main);
            padding: 50px 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* The Receipt Paper */
        .receipt-wrapper { 
            max-width: 420px; 
            width: 100%; 
            margin: 0 auto; 
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.5)); 
        }
        
        .receipt { 
            background-color: var(--receipt-bg); 
            padding: 48px 32px; 
            position: relative; 
            border-radius: 4px;
        }

        /* Header & Branding */
        .brand-name { 
            font-size: 2.2rem; 
            font-weight: 800; 
            letter-spacing: -0.05em; 
            margin-bottom: 4px;
            /* High-tech Cobalt to Teal Gradient */
            background: linear-gradient(135deg, var(--accent-cobalt), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .receipt-title { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            color: var(--text-muted); 
            font-weight: 600;
        }

        .divider { 
            border-top: 2px dashed var(--dash-color); 
            margin: 24px 0; 
        }
        
        /* Monospace Numbers for Tech Aesthetic */
        .mono-num { 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 700; 
            letter-spacing: -0.03em;
        }

        /* Meta Data (Client Info) */
        .meta-data { font-size: 0.85rem; line-height: 1.8; color: var(--text-muted); }
        .client-badge {
            display: inline-block;
            background-color: #f1f5f9;
            color: var(--text-main);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }

        /* Items List */
        .item-row { margin-bottom: 20px; }
        .item-desc { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; color: var(--text-main); }
        .item-details { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; line-height: 1.5; }
        .item-calc { font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }

        /* Interactive Simulator Panel */
        .simulator-panel {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin: 24px 0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .sim-title { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            font-weight: 800; 
            color: var(--accent-teal); 
            margin-bottom: 16px; 
            letter-spacing: 0.1em; 
        }
        
        .form-check-label { font-size: 0.85rem; font-weight: 500; cursor: pointer; color: var(--text-main); }
        .form-check-input { cursor: pointer; }
        .form-check-input:checked { background-color: var(--accent-teal); border-color: var(--accent-teal); }
        
        .payment-options { display: flex; flex-direction: column; gap: 10px; }
        .pay-opt-card {
            border: 1px solid var(--dash-color); 
            border-radius: 8px; 
            padding: 12px 16px;
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            background: #ffffff;
        }
        .pay-opt-card:hover { border-color: var(--accent-cobalt); transform: translateY(-1px); }
        .pay-opt-card.active { 
            border-color: var(--accent-cobalt); 
            background-color: #eff6ff; 
            box-shadow: 0 0 0 1px var(--accent-cobalt);
        }
        .pay-opt-card input { margin: 0; }

        /* Totals */
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.95rem; }
        .grand-total {
            font-size: 1.15rem; 
            font-weight: 800; 
            color: var(--text-main);
            margin-top: 16px; 
            padding-top: 16px; 
            border-top: 2px solid var(--text-main);
        }
        
        /* The Due Now Focus Block */
        .highlight-box {
            background: linear-gradient(135deg, var(--accent-cobalt), #1d4ed8);
            color: white;
            padding: 16px; 
            border-radius: 8px; 
            margin-top: 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .highlight-box .mono-num { font-size: 1.4rem; color: white; }
        .highlight-label { font-size: 0.85rem; font-weight: 600; opacity: 0.9; letter-spacing: 0.05em; }
        
        /* Action Button */
        .btn-pay { 
            background-color: var(--accent-teal); 
            color: white; 
            padding: 16px; 
            font-weight: 600; 
            font-size: 1rem;
            border-radius: 12px; 
            border: none; 
            width: 100%; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-top: 32px;
        }
        .btn-pay:active { transform: scale(0.98); }
        .btn-pay:hover { 
            background-color: #0f766e; 
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.4);
            transform: translateY(-2px);
        }full" checked>
                        <span class="form-check-label">Full Payment (1x)</span>
                    </label>
                    <label class="pay-opt-card" id="card-dp">
                        <input type="radio" name="pay_mode" value="dp">
                        <span class="form-check-label">Down Payment (50%)</span>
                    </label>
                    <label class="pay-opt-card" id="card-cicilan">
                        <input type="radio" name="pay_mode" value="cicilan">
                        <span class="form-check-label">Installments (3 Months)</span>
                    </label>
                </div>
            </div>

            <div class="total-row">
                <span class="text-muted fw-medium">Subtotal</span>
                <span id="ui-subtotal" class="mono-num"></span>
            </div>
            
            <div class="total-row grand-total">
                <span>TOTAL ESTIMATE</span>
                <span id="ui-total" class="mono-num"></span>
            </div>

            <div class="highlight-box">
                <div class="d-flex flex-column">
                    <span class="highlight-label mb-1" id="ui-due-label">DUE NOW</span>
                    <span class="opacity-75" style="font-size: 0.7rem;" id="ui-due-sub">100% Settlement</span>
                </div>
                <span id="ui-due-amount" class="mono-num"></span>
            </div>
            
            <div class="text-center text-muted mt-5" style="font-size: 0.75rem; line-height: 1.6;">
                *Premium Support Tier 1 (Rp 200k/mo) applies after month 6.<br>
                <strong>Thank you for building with bagusify.</strong>
            </div>

        </div>

        <button class="btn-pay d-flex justify-content-center gap-3 align-items-center shadow-lg">
            <span>Generate Invoice Link</span>
            <i class="bi bi-send-fill"></i>
        </button>
    </div>

    </script>
</body>
</html>
